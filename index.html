<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study | AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0, 0) scale(1); }
        }
        .animate-blob {
            animation: float 7s infinite alternate;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
    </style>
</head>
<body class="relative min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 font-sans text-white overflow-hidden">

    <div class="absolute top-1/4 left-1/4 w-72 h-72 bg-purple-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
    <div class="absolute bottom-1/4 right-1/4 w-72 h-72 bg-indigo-600 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob animation-delay-2000"></div>

    <div class="relative z-10 bg-white/10 backdrop-blur-xl border border-white/20 p-10 rounded-3xl shadow-[0_8px_32px_0_rgba(31,38,135,0.37)] max-w-lg w-full text-center">
        
        <header class="mb-8">
            <h1 class="text-4xl font-extrabold tracking-tight mb-2 bg-clip-text text-transparent bg-gradient-to-r from-white to-white/60">
                Smart Study
            </h1>
            <h2 class="text-white/70 text-lg leading-relaxed">
                Study the way you've never tried, with AI-powered technology
            </h2>
        </header>

        <div class="container">
            <form class="flex flex-col gap-5"> 
                <div class="text-left">
                    <label for="chooseTopic" class="text-xs uppercase tracking-widest font-semibold text-white/50 ml-1">Pick a topic</label>
                    <input type="text" name="chooseTopic" id="chooseTopic" required
                           placeholder="e.g. Machine Learning" 
                           class="mt-1 w-full bg-white/5 border border-white/10 rounded-2xl px-4 py-4 text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-purple-500/50 focus:bg-white/10 transition-all">
                </div>
                
                <button type="submit" 
                        class="mt-2 bg-gradient-to-r from-indigo-500 to-purple-500 text-white font-bold py-4 rounded-2xl hover:brightness-110 transition-all active:scale-95 shadow-xl shadow-indigo-500/20">
                    Generate Lesson Plan
                </button>
            </form>
        </div>

    </div>

    <footer class="relative z-10 mt-12 text-white/40 text-xs tracking-widest uppercase"> 
        &copy; Tuan Nghia, 2026 
    </footer>
    <script src="script.js"></script>
</body>
</html>
